name: slack
connection: slack
tools:
# ── OpenAPI-generated tools ──────────────────────────────────────────
- name: chat_postmessage
  source: openapi
  description: Sends a message to a channel.
  method: POST
  path: /chat.postMessage
  input_schema:
    type: object
    properties:
      as_user:
        type: string
      attachments:
        type: string
      blocks:
        type: string
      channel:
        type: string
      icon_emoji:
        type: string
      icon_url:
        type: string
      link_names:
        type: string
      mrkdwn:
        type: string
      parse:
        type: string
      reply_broadcast:
        type: string
      text:
        type: string
      thread_ts:
        type: string
      unfurl_links:
        type: string
      unfurl_media:
        type: string
      username:
        type: string
    required:
    - channel
- name: conversations_history
  source: openapi
  description: Fetches a conversation's history of messages and events.
  method: GET
  path: /conversations.history
  input_schema:
    type: object
    properties:
      channel:
        type: string
      latest:
        type: string
      oldest:
        type: string
      inclusive:
        type: string
      limit:
        type: integer
      cursor:
        type: string
  query_params:
  - channel
  - latest
  - oldest
  - inclusive
  - limit
  - cursor
- name: conversations_list
  source: openapi
  description: Lists all channels in a Slack team.
  method: GET
  path: /conversations.list
  input_schema:
    type: object
    properties:
      exclude_archived:
        type: string
      types:
        type: string
      limit:
        type: integer
      cursor:
        type: string
  query_params:
  - exclude_archived
  - types
  - limit
  - cursor
- name: conversations_replies
  source: openapi
  description: Retrieve a thread of messages posted to a conversation
  method: GET
  path: /conversations.replies
  input_schema:
    type: object
    properties:
      channel:
        type: string
      ts:
        type: string
      latest:
        type: string
      oldest:
        type: string
      inclusive:
        type: string
      limit:
        type: integer
      cursor:
        type: string
  query_params:
  - channel
  - ts
  - latest
  - oldest
  - inclusive
  - limit
  - cursor
- name: reactions_add
  source: openapi
  description: Adds a reaction to an item.
  method: POST
  path: /reactions.add
  input_schema:
    type: object
    properties:
      channel:
        type: string
      name:
        type: string
      timestamp:
        type: string
    required:
    - channel
    - name
    - timestamp
- name: users_list
  source: openapi
  description: Lists all users in a Slack team.
  method: GET
  path: /users.list
  input_schema:
    type: object
    properties:
      limit:
        type: integer
      cursor:
        type: string
      include_locale:
        type: string
  query_params:
  - limit
  - cursor
  - include_locale
- name: users_profile_get
  source: openapi
  description: Retrieves a user's profile information.
  method: GET
  path: /users.profile.get
  input_schema:
    type: object
    properties:
      include_labels:
        type: string
      user:
        type: string
  query_params:
  - include_labels
  - user
# ── Custom tools (not in Slack OpenAPI spec) ─────────────────────────
- name: search_messages
  source: custom
  description: Searches for messages matching a query.
  method: GET
  path: /search.messages
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: Search query text
      count:
        type: integer
        description: Number of items to return per page
      highlight:
        type: boolean
        description: Pass true to enable query highlight markers
      page:
        type: integer
        description: Page number of results to return
      cursor:
        type: string
        description: Pagination cursor
      sort:
        type: string
        description: Return matches sorted by either score or timestamp
      sort_dir:
        type: string
        description: Sort direction (asc or desc)
      team_id:
        type: string
        description: Encoded team id to search in
    required:
    - query
  query_params:
  - query
  - count
  - highlight
  - page
  - cursor
  - sort
  - sort_dir
  - team_id
- name: search_files
  source: custom
  description: Searches for files matching a query.
  method: GET
  path: /search.files
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: Search query text
      count:
        type: integer
        description: Number of items to return per page
      highlight:
        type: boolean
        description: Pass true to enable query highlight markers
      page:
        type: integer
        description: Page number of results to return
      cursor:
        type: string
        description: Pagination cursor
      sort:
        type: string
        description: Return matches sorted by either score or timestamp
      sort_dir:
        type: string
        description: Sort direction (asc or desc)
      team_id:
        type: string
        description: Encoded team id to search in
    required:
    - query
  query_params:
  - query
  - count
  - highlight
  - page
  - cursor
  - sort
  - sort_dir
  - team_id
- name: search_all
  source: custom
  description: Searches for messages and files matching a query.
  method: GET
  path: /search.all
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: Search query text
      count:
        type: integer
        description: Number of items to return per page
      highlight:
        type: boolean
        description: Pass true to enable query highlight markers
      page:
        type: integer
        description: Page number of results to return
      cursor:
        type: string
        description: Pagination cursor
      sort:
        type: string
        description: Return matches sorted by either score or timestamp
      sort_dir:
        type: string
        description: Sort direction (asc or desc)
      team_id:
        type: string
        description: Encoded team id to search in
    required:
    - query
  query_params:
  - query
  - count
  - highlight
  - page
  - cursor
  - sort
  - sort_dir
  - team_id
- name: canvases_create
  source: custom
  description: Create a new canvas.
  method: POST
  path: /canvases.create
  input_schema:
    type: object
    properties:
      title:
        type: string
        description: Title of the canvas
      document_content:
        type: object
        description: Structure containing type and markdown content
      channel_id:
        type: string
        description: Channel to share the canvas in
- name: canvases_edit
  source: custom
  description: Edit an existing canvas.
  method: POST
  path: /canvases.edit
  input_schema:
    type: object
    properties:
      canvas_id:
        type: string
        description: Encoded ID of the canvas
      changes:
        type: array
        description: List of changes to apply to the canvas
        items:
          type: object
    required:
    - canvas_id
    - changes
- name: canvases_delete
  source: custom
  description: Delete a canvas.
  method: POST
  path: /canvases.delete
  input_schema:
    type: object
    properties:
      canvas_id:
        type: string
        description: Encoded ID of the canvas to delete
    required:
    - canvas_id
- name: canvases_access_set
  source: custom
  description: Set access level for a canvas.
  method: POST
  path: /canvases.access.set
  input_schema:
    type: object
    properties:
      canvas_id:
        type: string
        description: Encoded ID of the canvas
      access_level:
        type: string
        description: Desired access level (read, write)
      channel_ids:
        type: array
        description: Channel IDs to grant access
        items:
          type: string
      user_ids:
        type: array
        description: User IDs to grant access
        items:
          type: string
    required:
    - canvas_id
    - access_level
- name: canvases_access_delete
  source: custom
  description: Remove access to a canvas for specified entities.
  method: POST
  path: /canvases.access.delete
  input_schema:
    type: object
    properties:
      canvas_id:
        type: string
        description: Encoded ID of the canvas
      channel_ids:
        type: array
        description: Channel IDs to remove access from
        items:
          type: string
      user_ids:
        type: array
        description: User IDs to remove access from
        items:
          type: string
    required:
    - canvas_id
