$schema: "https://json-schema.org/draft/2020-12/schema"
title: UC MCP Service Definition
type: object
required:
  - name
  - connection
  - tools
properties:
  name:
    type: string
    pattern: "^[a-z][a-z0-9-]*$"
    description: Service name in kebab-case
  connection:
    type: string
    description: Databricks UC connection name
  description:
    type: string
    description: Human-readable service description
  base_url:
    type: string
    description: Optional base URL override
  auth:
    type: object
    properties:
      type:
        type: string
        enum: [bearer, header, query]
      token_env:
        type: string
      header_name:
        type: string
      query_param:
        type: string
  tools:
    type: array
    minItems: 1
    # additionalProperties is intentionally unrestricted on tool items
    # to allow the codegen-only "source" metadata field (openapi | custom).
    items:
      type: object
      required:
        - name
        - description
        - method
        - path
      properties:
        name:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
          description: Tool name in snake_case
        description:
          type: string
          description: What this tool does
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
        path:
          type: string
          description: URL path template
        input_schema:
          type: object
          description: JSON Schema for tool input
        query_params:
          type: array
          items:
            type: string
          description: Parameter names to send as query params
        headers:
          type: object
          additionalProperties:
            type: string
          description: Extra headers for this tool
        response:
          type: object
          properties:
            result_key:
              type: string
            error_key:
              type: string
            success_field:
              type: string
            result_template:
              type: string
        timeout:
          type: integer
          minimum: 1
          description: Timeout in seconds
