openapi: "3.0.0"
info:
  title: Simple Test API
  version: "1.0.0"
paths:
  /items:
    get:
      operationId: list_items
      summary: List all items
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
    post:
      operationId: create_item
      summary: Create an item
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
                - name
  /items/{item_id}:
    get:
      operationId: get_item
      summary: Get item by ID
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
