name: test-service
connection: test_connection
description: A simple test service
tools:
  - name: get_item
    description: Get an item by ID
    method: GET
    path: /items/{item_id}
    input_schema:
      type: object
      properties:
        item_id:
          type: string
          description: The item ID
      required:
        - item_id
  - name: create_item
    description: Create a new item
    method: POST
    path: /items
    input_schema:
      type: object
      properties:
        name:
          type: string
          description: Item name
        value:
          type: integer
          description: Item value
      required:
        - name
