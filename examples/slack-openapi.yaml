info:
  description: Curated Slack Web API — core messaging, channels, users, reactions,
    search, files
  title: Slack Web API
  version: 1.0.0
openapi: 3.0.0
paths:
  /auth.test:
    get:
      consumes:
      - application/x-www-form-urlencoded
      - application/json
      description: Checks authentication & identity.
      externalDocs:
        description: API method documentation
        url: https://api.slack.com/methods/auth.test
      operationId: auth_test
      parameters:
      - description: 'Authentication token. Requires scope: `none`'
        in: header
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: Standard success response when used with a user token
          examples:
            application/json:
              ok: true
              team: Subarachnoid Workspace
              team_id: T12345678
              url: https://subarachnoid.slack.com/
              user: grace
              user_id: W12345678
          schema:
            additionalProperties: false
            description: Schema for successful response auth.test method
            properties:
              bot_id:
                $ref: '#/definitions/defs_bot_id'
              is_enterprise_install:
                type: boolean
              ok:
                $ref: '#/definitions/defs_ok_true'
              team:
                type: string
              team_id:
                $ref: '#/definitions/defs_team'
              url:
                type: string
              user:
                type: string
              user_id:
                $ref: '#/definitions/defs_user_id'
            required:
            - ok
            - url
            - team
            - user
            - team_id
            - user_id
            title: auth.test success schema
            type: object
        default:
          description: Standard failure response when used with an invalid token
          examples:
            application/json:
              error: invalid_auth
              ok: false
          schema:
            additionalProperties: false
            description: Schema for error response auth.test method
            properties:
              callstack:
                description: 'Note: PHP callstack is only visible in dev/qa'
                type: string
              error:
                enum:
                - not_authed
                - invalid_auth
                - token_revoked
                - account_inactive
                - invalid_arg_name
                - invalid_array_arg
                - invalid_charset
                - invalid_form_data
                - invalid_post_type
                - missing_post_type
                - invalid_json
                - json_not_object
                - request_timeout
                - upgrade_required
                type: string
              ok:
                $ref: '#/definitions/defs_ok_false'
            required:
            - ok
            - error
            title: auth.test error schema
            type: object
      security:
      - slackAuth:
        - none
      tags:
      - auth
  /chat.delete:
    post:
      consumes:
      - application/x-www-form-urlencoded
      - application/json
      description: Deletes a message.
      externalDocs:
        description: API method documentation
        url: https://api.slack.com/methods/chat.delete
      operationId: chat_delete
      parameters:
      - description: 'Authentication token. Requires scope: `chat:write`'
        in: header
        name: token
        type: string
      - description: Timestamp of the message to be deleted.
        in: formData
        name: ts
        type: number
      - description: Channel containing the message to be deleted.
        in: formData
        name: channel
        type: string
      - description: Pass true to delete the message as the authed user with `chat:write:user`
          scope. [Bot users](/bot-users) in this context are considered authed users.
          If unused or false, the message will be deleted with `chat:write:bot` scope.
        in: formData
        name: as_user
        type: boolean
      produces:
      - application/json
      responses:
        '200':
          description: Typical success response
          examples:
            application/json:
              channel: C024BE91L
              ok: true
              ts: '1401383885.000061'
          schema:
            additionalProperties: false
            description: Schema for successful response of chat.delete method
            properties:
              channel:
                $ref: '#/definitions/defs_channel'
              ok:
                $ref: '#/definitions/defs_ok_true'
              ts:
                $ref: '#/definitions/defs_ts'
            required:
            - ok
            - channel
            - ts
            title: chat.delete success schema
            type: object
        default:
          description: Typical error response
          examples:
            application/json:
              error: message_not_found
              ok: false
          schema:
            additionalProperties: false
            description: Schema for error response from chat.delete method
            properties:
              callstack:
                description: 'Note: PHP callstack is only visible in dev/qa'
                type: string
              error:
                enum:
                - message_not_found
                - channel_not_found
                - cant_delete_message
                - compliance_exports_prevent_deletion
                - not_authed
                - invalid_auth
                - account_inactive
                - token_revoked
                - no_permission
                - invalid_arg_name
                - invalid_array_arg
                - invalid_charset
                - invalid_form_data
                - invalid_post_type
                - missing_post_type
                - team_added_to_org
                - invalid_json
                - json_not_object
                - request_timeout
                - upgrade_required
                - fatal_error
                type: string
              ok:
                $ref: '#/definitions/defs_ok_false'
            required:
            - ok
            - error
            title: chat.delete error schema
            type: object
      security:
      - slackAuth:
        - chat:write:user
        - chat:write:bot
      tags:
      - chat
  /chat.getPermalink:
    get:
      consumes:
      - application/x-www-form-urlencoded
      description: Retrieve a permalink URL for a specific extant message
      externalDocs:
        description: API method documentation
        url: https://api.slack.com/methods/chat.getPermalink
      operationId: chat_getPermalink
      parameters:
      - description: 'Authentication token. Requires scope: `none`'
        in: query
        name: token
        required: true
        type: string
      - description: The ID of the conversation or channel containing the message
        in: query
        name: channel
        required: true
        type: string
      - description: A message's `ts` value, uniquely identifying it within a channel
        in: query
        name: message_ts
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: Standard success response
          examples:
            application/json:
              channel: C1H9RESGA
              ok: true
              permalink: https://ghostbusters.slack.com/archives/C1H9RESGA/p135854651500008
          schema:
            additionalProperties: false
            description: Schema for successful response chat.getPermalink
            properties:
              channel:
                $ref: '#/definitions/defs_channel'
              ok:
                $ref: '#/definitions/defs_ok_true'
              permalink:
                format: uri
                type: string
            required:
            - ok
            - channel
            - permalink
            title: chat.getPermalink success schema
            type: object
        default:
          description: Error response when channel cannot be found
          examples:
            application/json:
              error: channel_not_found
              ok: false
          schema:
            additionalProperties: false
            description: Schema for error response from chat.getPermalink method
            properties:
              callstack:
                description: 'Note: PHP callstack is only visible in dev/qa'
                type: string
              error:
                enum:
                - channel_not_found
                - message_not_found
                - not_authed
                - invalid_auth
                - account_inactive
                - token_revoked
                - no_permission
                - org_login_required
                - invalid_arg_name
                - invalid_array_arg
                - invalid_charset
                - invalid_form_data
                - invalid_post_type
                - missing_post_type
                - team_added_to_org
                - invalid_json
                - json_not_object
                - request_timeout
                - upgrade_required
                - fatal_error
                type: string
              ok:
                $ref: '#/definitions/defs_ok_false'
            required:
            - ok
            - error
            title: chat.getPermalink error schema
            type: object
      security:
      - slackAuth:
        - none
      tags:
      - chat
  /chat.postEphemeral:
    post:
      consumes:
      - application/x-www-form-urlencoded
      - application/json
      description: Sends an ephemeral message to a user in a channel.
      externalDocs:
        description: API method documentation
        url: https://api.slack.com/methods/chat.postEphemeral
      operationId: chat_postEphemeral
      parameters:
      - description: 'Authentication token. Requires scope: `chat:write`'
        in: header
        name: token
        required: true
        type: string
      - description: Pass true to post the message as the authed user. Defaults to
          true if the chat:write:bot scope is not included. Otherwise, defaults to
          false.
        in: formData
        name: as_user
        type: boolean
      - description: A JSON-based array of structured attachments, presented as a
          URL-encoded string.
        in: formData
        name: attachments
        type: string
      - description: A JSON-based array of structured blocks, presented as a URL-encoded
          string.
        in: formData
        name: blocks
        type: string
      - description: Channel, private group, or IM channel to send message to. Can
          be an encoded ID, or a name.
        in: formData
        name: channel
        required: true
        type: string
      - description: Emoji to use as the icon for this message. Overrides `icon_url`.
          Must be used in conjunction with `as_user` set to `false`, otherwise ignored.
          See [authorship](#authorship) below.
        in: formData
        name: icon_emoji
        type: string
      - description: URL to an image to use as the icon for this message. Must be
          used in conjunction with `as_user` set to false, otherwise ignored. See
          [authorship](#authorship) below.
        in: formData
        name: icon_url
        type: string
      - description: Find and link channel names and usernames.
        in: formData
        name: link_names
        type: boolean
      - description: Change how messages are treated. Defaults to `none`. See [below](#formatting).
        in: formData
        name: parse
        type: string
      - description: How this field works and whether it is required depends on other
          fields you use in your API call. [See below](#text_usage) for more detail.
        in: formData
        name: text
        type: string
      - description: Provide another message's `ts` value to post this message in
          a thread. Avoid using a reply's `ts` value; use its parent's value instead.
          Ephemeral messages in threads are only shown if there is already an active
          thread.
        in: formData
        name: thread_ts
        type: string
      - description: '`id` of the user who will receive the ephemeral message. The
          user should be in the channel specified by the `channel` argument.'
        in: formData
        name: user
        required: true
        type: string
      - description: Set your bot's user name. Must be used in conjunction with `as_user`
          set to false, otherwise ignored. See [authorship](#authorship) below.
        in: formData
        name: username
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: Typical success response
          examples:
            application/json:
              message_ts: '1502210682.580145'
              ok: true
          schema:
            additionalProperties: false
            description: Schema for successful response from chat.postEphemeral method
            properties:
              message_ts:
                $ref: '#/definitions/defs_ts'
              ok:
                $ref: '#/definitions/defs_ok_true'
            required:
            - ok
            - message_ts
            title: chat.postEphemeral success schema
            type: object
        default:
          description: Typical error response
          examples:
            application/json:
              error: user_not_in_channel
              ok: false
          schema:
            additionalProperties: false
            description: Schema for error response from chat.postEphemeral method
            properties:
              callstack:
                description: 'Note: PHP callstack is only visible in dev/qa'
                type: string
              error:
                enum:
                - channel_not_found
                - is_archived
                - msg_too_long
                - no_text
                - restricted_action
                - too_many_attachments
                - user_not_in_channel
                - not_authed
                - invalid_auth
                - account_inactive
                - token_revoked
                - no_permission
                - org_login_required
                - invalid_arg_name
                - invalid_array_arg
                - invalid_charset
                - invalid_form_data
                - invalid_post_type
                - missing_post_type
                - team_added_to_org
                - invalid_json
                - json_not_object
                - request_timeout
                - upgrade_required
                - fatal_error
                type: string
              ok:
                $ref: '#/definitions/defs_ok_false'
            required:
            - ok
            - error
            title: chat.postEphemeral error schema
            type: object
      security:
      - slackAuth:
        - chat:write:user
        - chat:write:bot
      tags:
      - chat
  /chat.postMessage:
    post:
      consumes:
      - application/x-www-form-urlencoded
      - application/json
      description: Sends a message to a channel.
      externalDocs:
        description: API method documentation
        url: https://api.slack.com/methods/chat.postMessage
      operationId: chat_postMessage
      parameters:
      - description: 'Authentication token. Requires scope: `chat:write`'
        in: header
        name: token
        required: true
        type: string
      - description: Pass true to post the message as the authed user, instead of
          as a bot. Defaults to false. See [authorship](#authorship) below.
        in: formData
        name: as_user
        type: string
      - description: A JSON-based array of structured attachments, presented as a
          URL-encoded string.
        in: formData
        name: attachments
        type: string
      - description: A JSON-based array of structured blocks, presented as a URL-encoded
          string.
        in: formData
        name: blocks
        type: string
      - description: Channel, private group, or IM channel to send message to. Can
          be an encoded ID, or a name. See [below](#channels) for more details.
        in: formData
        name: channel
        required: true
        type: string
      - description: Emoji to use as the icon for this message. Overrides `icon_url`.
          Must be used in conjunction with `as_user` set to `false`, otherwise ignored.
          See [authorship](#authorship) below.
        in: formData
        name: icon_emoji
        type: string
      - description: URL to an image to use as the icon for this message. Must be
          used in conjunction with `as_user` set to false, otherwise ignored. See
          [authorship](#authorship) below.
        in: formData
        name: icon_url
        type: string
      - description: Find and link channel names and usernames.
        in: formData
        name: link_names
        type: boolean
      - description: Disable Slack markup parsing by setting to `false`. Enabled by
          default.
        in: formData
        name: mrkdwn
        type: boolean
      - description: Change how messages are treated. Defaults to `none`. See [below](#formatting).
        in: formData
        name: parse
        type: string
      - description: Used in conjunction with `thread_ts` and indicates whether reply
          should be made visible to everyone in the channel or conversation. Defaults
          to `false`.
        in: formData
        name: reply_broadcast
        type: boolean
      - description: How this field works and whether it is required depends on other
          fields you use in your API call. [See below](#text_usage) for more detail.
        in: formData
        name: text
        type: string
      - description: Provide another message's `ts` value to make this message a reply.
          Avoid using a reply's `ts` value; use its parent instead.
        in: formData
        name: thread_ts
        type: string
      - description: Pass true to enable unfurling of primarily text-based content.
        in: formData
        name: unfurl_links
        type: boolean
      - description: Pass false to disable unfurling of media content.
        in: formData
        name: unfurl_media
        type: boolean
      - description: Set your bot's user name. Must be used in conjunction with `as_user`
          set to false, otherwise ignored. See [authorship](#authorship) below.
        in: formData
        name: username
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: Typical success response
          examples:
            application/json:
              channel: C1H9RESGL
              message:
                attachments:
                - fallback: This is an attachment's fallback
                  id: 1
                  text: This is an attachment
                bot_id: B19LU7CSY
                subtype: bot_message
                text: Here's a message for you
                ts: '1503435956.000247'
                type: message
                username: ecto1
              ok: true
              ts: '1503435956.000247'
          schema:
            additionalProperties: false
            description: Schema for successful response of chat.postMessage method
            properties:
              channel:
                $ref: '#/definitions/defs_channel'
              message:
                $ref: '#/definitions/objs_message'
              ok:
                $ref: '#/definitions/defs_ok_true'
              ts:
                $ref: '#/definitions/defs_ts'
            required:
            - ok
            - channel
            - ts
            - message
            title: chat.postMessage success schema
            type: object
        default:
          description: Typical error response if too many attachments are included
          examples:
            application/json:
              error: too_many_attachments
              ok: false
          schema:
            additionalProperties: false
            description: Schema for error response chat.postMessage method
            properties:
              callstack:
                description: 'Note: PHP callstack is only visible in dev/qa'
                type: string
              error:
                enum:
                - channel_not_found
                - not_in_channel
                - is_archived
                - msg_too_long
                - no_text
                - too_many_attachments
                - rate_limited
                - not_authed
                - invalid_auth
                - account_inactive
                - invalid_arg_name
                - invalid_array_arg
                - invalid_charset
                - invalid_form_data
                - invalid_post_type
                - missing_post_type
                type: string
              ok:
                $ref: '#/definitions/defs_ok_false'
            required:
            - ok
            - error
            title: chat.postMessage error schema
            type: object
      security:
      - slackAuth:
        - chat:write:user
        - chat:write:bot
      tags:
      - chat
  /chat.update:
    post:
      consumes:
      - application/x-www-form-urlencoded
      - application/json
      description: Updates a message.
      externalDocs:
        description: API method documentation
        url: https://api.slack.com/methods/chat.update
      operationId: chat_update
      parameters:
      - description: 'Authentication token. Requires scope: `chat:write`'
        in: header
        name: token
        required: true
        type: string
      - description: Pass true to update the message as the authed user. [Bot users](/bot-users)
          in this context are considered authed users.
        in: formData
        name: as_user
        type: string
      - description: A JSON-based array of structured attachments, presented as a
          URL-encoded string. This field is required when not presenting `text`. If
          you don't include this field, the message's previous `attachments` will
          be retained. To remove previous `attachments`, include an empty array for
          this field.
        in: formData
        name: attachments
        type: string
      - description: A JSON-based array of [structured blocks](/block-kit/building),
          presented as a URL-encoded string. If you don't include this field, the
          message's previous `blocks` will be retained. To remove previous `blocks`,
          include an empty array for this field.
        in: formData
        name: blocks
        type: string
      - description: Channel containing the message to be updated.
        in: formData
        name: channel
        required: true
        type: string
      - description: Find and link channel names and usernames. Defaults to `none`.
          If you do not specify a value for this field, the original value set for
          the message will be overwritten with the default, `none`.
        in: formData
        name: link_names
        type: string
      - description: Change how messages are treated. Defaults to `client`, unlike
          `chat.postMessage`. Accepts either `none` or `full`. If you do not specify
          a value for this field, the original value set for the message will be overwritten
          with the default, `client`.
        in: formData
        name: parse
        type: string
      - description: New text for the message, using the [default formatting rules](/reference/surfaces/formatting).
          It's not required when presenting `blocks` or `attachments`.
        in: formData
        name: text
        type: string
      - description: Timestamp of the message to be updated.
        in: formData
        name: ts
        required: true
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: Typical success response
          examples:
            application/json:
              channel: C024BE91L
              message:
                text: Updated text you carefully authored
                user: U34567890
              ok: true
              text: Updated text you carefully authored
              ts: '1401383885.000061'
          schema:
            additionalProperties: false
            description: Schema for successful response of chat.update method
            properties:
              channel:
                type: string
              message:
                properties:
                  attachments:
                    items:
                      type: object
                    type: array
                  blocks:
                    type: object
                  text:
                    type: string
                required:
                - text
                title: Message object
                type: object
              ok:
                $ref: '#/definitions/defs_ok_true'
              text:
                type: string
              ts:
                type: string
            required:
            - ok
            - channel
            - ts
            - text
            - message
            title: chat.update success schema
            type: object
        default:
          description: Typical error response
          examples:
            application/json:
              error: cant_update_message
              ok: false
          schema:
            additionalProperties: false
            description: Schema for error response chat.update method
            properties:
              callstack:
                description: 'Note: PHP callstack is only visible in dev/qa'
                type: string
              error:
                enum:
                - message_not_found
                - cant_update_message
                - channel_not_found
                - edit_window_closed
                - msg_too_long
                - too_many_attachments
                - rate_limited
                - no_text
                - not_authed
                - invalid_auth
                - account_inactive
                - token_revoked
                - no_permission
                - invalid_arg_name
                - invalid_array_arg
                - invalid_charset
                - invalid_form_data
                - invalid_post_type
                - missing_post_type
                - request_timeout
                - invalid_json
                - json_not_object
                - upgrade_required
                - fatal_error
                - is_inactive
                type: string
              ok:
                $ref: '#/definitions/defs_ok_false'
            required:
            - ok
            - error
            title: chat.update error schema
            type: object
      security:
      - slackAuth:
        - chat:write:user
        - chat:write:bot
      tags:
      - chat
  /conversations.history:
    get:
      consumes:
      - application/x-www-form-urlencoded
      description: Fetches a conversation's history of messages and events.
      externalDocs:
        description: API method documentation
        url: https://api.slack.com/methods/conversations.history
      operationId: conversations_history
      parameters:
      - description: 'Authentication token. Requires scope: `conversations:history`'
        in: query
        name: token
        type: string
      - description: Conversation ID to fetch history for.
        in: query
        name: channel
        type: string
      - description: End of time range of messages to include in results.
        in: query
        name: latest
        type: number
      - description: Start of time range of messages to include in results.
        in: query
        name: oldest
        type: number
      - description: Include messages with latest or oldest timestamp in results only
          when either timestamp is specified.
        in: query
        name: inclusive
        type: boolean
      - description: The maximum number of items to return. Fewer than the requested
          number of items may be returned, even if the end of the users list hasn't
          been reached.
        in: query
        name: limit
        type: integer
      - description: Paginate through collections of data by setting the `cursor`
          parameter to a `next_cursor` attribute returned by a previous request's
          `response_metadata`. Default value fetches the first "page" of the collection.
          See [pagination](/docs/pagination) for more detail.
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        '200':
          description: Typical success response containing a channel's messages
          examples:
            application/json:
              has_more: true
              messages:
              - text: I find you punny and would like to smell your nose letter
                ts: '1512085950.000216'
                type: message
                user: U012AB3CDE
              - text: What, you want to smell my shoes better?
                ts: '1512104434.000490'
                type: message
                user: U061F7AUR
              ok: true
              pin_count: 0
              response_metadata:
                next_cursor: bmV4dF90czoxNTEyMDg1ODYxMDAwNTQz
          schema:
            additionalProperties: false
            description: Schema for successful response from conversations.history
              method
            properties:
              channel_actions_count:
                type: integer
              channel_actions_ts:
                items:
                - type: integer
                - type: 'null'
              has_more:
                type: boolean
              messages:
                items:
                  $ref: '#/definitions/objs_message'
                minItems: 1
                type: array
                uniqueItems: true
              ok:
                $ref: '#/definitions/defs_ok_true'
              pin_count:
                type: integer
            required:
            - ok
            - messages
            - has_more
            - pin_count
            - channel_actions_ts
            - channel_actions_count
            title: conversations.history success schema
            type: object
        default:
          description: Typical error response
          examples:
            application/json:
              error: channel_not_found
              ok: false
          schema:
            additionalProperties: false
            description: Schema for error response from conversations.history method
